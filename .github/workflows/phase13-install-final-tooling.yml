name: Phase 13 Install Final Release Tooling

on:
  push:
    branches: [release/v1.0.0-certification]
    paths:
      - .github/workflows/phase13-install-final-tooling.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase13-install-final-tooling
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v1.0.0-certification
          fetch-depth: 0
          persist-credentials: true
      - name: Install frozen final-release tooling
        shell: bash
        run: |
          cat > /tmp/phase13-final-tooling.b64 <<'PAYLOAD'

PAYLOAD
          base64 -d /tmp/phase13-final-tooling.b64 > /tmp/phase13-final-tooling.tar.gz
          tar -xzf /tmp/phase13-final-tooling.tar.gz -C "$GITHUB_WORKSPACE"
          node --check scripts/phase13-nonpublic-audit.mjs
          node --check scripts/phase13-package-final.mjs
          node --check scripts/phase13-validate-archives.mjs
          node --check scripts/phase13-public-validation.mjs
          node --check scripts/phase13-final-signoff.mjs
          node --check scripts/phase13-firefox-screenshots.mjs
          python - <<'PY'
          import pathlib, yaml
          for path in pathlib.Path('.github/workflows').glob('phase13-*.yml'):
              yaml.safe_load(path.read_text())
          print('Phase 13 final workflow YAML parsed successfully.')
          PY
      - name: Commit frozen final-release tooling
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/phase13-* .github/workflows/phase13-*.yml
          git commit -m "Freeze Phase 13 final certification and publication tooling"
          git push origin HEAD:release/v1.0.0-certification
