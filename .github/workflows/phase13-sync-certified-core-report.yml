name: Sync Certified Core Validation Evidence

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-sync-certified-core-report.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Recover and verify certified core report
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
          REPORT_PATH: docs/PHASE10_CORE_VALIDATION.json
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/phase13-core-artifact /tmp/phase13-core-source
          mkdir -p /tmp/phase13-core-artifact /tmp/phase13-core-source
          gh run download 28948294260 \
            --repo "$GITHUB_REPOSITORY" \
            --name phase13-final-release-artifacts \
            --dir /tmp/phase13-core-artifact
          unzip -q /tmp/phase13-core-artifact/release/ECHOFRAME_v1.0.0_final_source.zip -d /tmp/phase13-core-source
          report="/tmp/phase13-core-source/${REPORT_PATH}"
          test -f "$report"
          node --input-type=module - "$report" <<'NODE'
          import { readFile } from 'node:fs/promises';
          const report = JSON.parse(await readFile(process.argv[2], 'utf8'));
          const test = report.commands?.find((entry) => entry.command === 'npm run test');
          const checks = {
            reportPassed: report.passed === true,
            commandPassed: test?.passed === true,
            tests: test?.tests === 1329,
            pass: test?.pass === 1329,
            fail: test?.fail === 0,
          };
          if (!Object.values(checks).every(Boolean)) throw new Error(`Certified core report mismatch: ${JSON.stringify(checks)}`);
          console.log(JSON.stringify({ passed: true, checks, generatedAt: report.generatedAt }, null, 2));
          NODE
          current="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${REPORT_PATH}?ref=main")"
          current_sha="$(printf '%s' "$current" | jq -r '.sha')"
          encoded="$(base64 -w 0 "$report")"
          response="$(curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${REPORT_PATH}" \
            --data "$(jq -cn --arg message 'Restore certified 1,329-test core validation evidence' --arg content "$encoded" --arg branch main --arg sha "$current_sha" '{message:$message,content:$content,branch:$branch,sha:$sha}')")"
          main_commit="$(printf '%s' "$response" | jq -r '.commit.sha')"
          report_blob="$(printf '%s' "$response" | jq -r '.content.sha')"
          marker="$(jq -cn --arg syncedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --arg mainCommit "$main_commit" --arg reportBlob "$report_blob" '{syncedAt:$syncedAt,mainCommit:$mainCommit,reportBlob:$reportBlob,tests:1329,pass:1329,fail:0,passed:true}')"
          marker_encoded="$(printf '%s\n' "$marker" | base64 -w 0)"
          status_path=".phase13-dispatch-status/certified-core-sync.json"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${status_path}?ref=${OPS_BRANCH}" || true)"
          status_sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          payload="$(jq -cn --arg message 'Record certified core evidence sync' --arg content "$marker_encoded" --arg branch "$OPS_BRANCH" --arg sha "$status_sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${status_path}" \
            --data "$payload"
