name: Patch Final Release Validation Harness

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-patch-finalizer.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Adapt nested Settings navigation in temporary public validator
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
          TARGET_PATH: .github/workflows/phase13-finalize-live-release.yml
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}?ref=${OPS_BRANCH}")"
          sha="$(printf '%s' "$response" | jq -r '.sha')"
          printf '%s' "$response" | jq -r '.content' | tr -d '\n' | base64 -d > /tmp/finalizer.yml
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/finalizer.yml')
          text = path.read_text()
          old = """      - name: Validate live site in real Chromium and Firefox
        run: node scripts/phase13-public-validation.mjs
"""
          new = """      - name: Validate live site in real Chromium and Firefox
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/phase13-public-validation.mjs /tmp/phase13-public-validation.original.mjs
          restore_validator() { cp /tmp/phase13-public-validation.original.mjs scripts/phase13-public-validation.mjs; }
          trap restore_validator EXIT
          python3 - <<'PYVALIDATOR'
          from pathlib import Path
          validator = Path('scripts/phase13-public-validation.mjs')
          source = validator.read_text()
          old_navigation = "    await page.keyboard.press('Escape');\\n    await waitForScene(page, 'MainMenuScene');"
          new_navigation = "    await page.keyboard.press('Escape');\\n    await sleep(150);\\n    await page.keyboard.press('Escape');\\n    await waitForScene(page, 'MainMenuScene');"
          if source.count(old_navigation) != 1:
              raise SystemExit(f'Expected one nested Settings navigation sequence, found {source.count(old_navigation)}')
          validator.write_text(source.replace(old_navigation, new_navigation, 1))
          PYVALIDATOR
          node scripts/phase13-public-validation.mjs
"""
          if old not in text:
              if 'restore_validator()' in text:
                  print('Finalizer already contains the navigation adapter.')
                  raise SystemExit(0)
              raise SystemExit('Target validation step not found.')
          path.write_text(text.replace(old, new, 1))
          PY
          encoded="$(base64 -w 0 /tmp/finalizer.yml)"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}" \
            --data "$(jq -cn --arg message 'Adapt public validation to nested Settings navigation' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$sha" '{message:$message,content:$content,branch:$branch,sha:$sha}')"
