name: Apply Final Release Harness Fix

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-patch-finalizer-v2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OPS_BRANCH: ops/phase13-publication-dispatch
      TARGET_PATH: .github/workflows/phase13-finalize-live-release.yml
      OLD_BLOCK_B64: ICAgICAgLSBuYW1lOiBWYWxpZGF0ZSBsaXZlIHNpdGUgaW4gcmVhbCBDaHJvbWl1bSBhbmQgRmlyZWZveAogICAgICAgIHJ1bjogbm9kZSBzY3JpcHRzL3BoYXNlMTMtcHVibGljLXZhbGlkYXRpb24ubWpzCg==
      NEW_BLOCK_B64: 
    steps:
      - name: Replace exact validation step
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Applying reversible public-validation navigation adapter."
          response="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}?ref=${OPS_BRANCH}")"
          sha="$(printf '%s' "$response" | jq -r '.sha')"
          printf '%s' "$response" | jq -r '.content' | tr -d '\n' | base64 -d > /tmp/finalizer.yml
          python3 -c "import os,base64,pathlib; p=pathlib.Path('/tmp/finalizer.yml'); s=p.read_text(); old=base64.b64decode(os.environ['OLD_BLOCK_B64']).decode(); new=base64.b64decode(os.environ['NEW_BLOCK_B64']).decode(); assert s.count(old)==1, f'expected one target block, found {s.count(old)}'; p.write_text(s.replace(old,new,1))"
          encoded="$(base64 -w 0 /tmp/finalizer.yml)"
          payload="$(jq -cn --arg message 'Adapt public validation to nested Settings navigation' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$sha" '{message:$message,content:$content,branch:$branch,sha:$sha}')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}" \
            --data "$payload"
