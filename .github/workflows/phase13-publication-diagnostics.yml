name: Diagnose Phase 13 Publication

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-publication-diagnostics.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Capture failed publication job tail
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
        shell: bash
        run: |
          set -euo pipefail
          runs="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/phase13-publish.yml/runs?branch=main&event=workflow_dispatch&per_page=10")"
          run_id="$(printf '%s' "$runs" | jq -r '.workflow_runs | sort_by(.created_at) | last | .id')"
          jobs="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?filter=latest&per_page=100")"
          job_id="$(printf '%s' "$jobs" | jq -r '.jobs[] | select(.conclusion == "failure") | .id' | head -n 1)"
          test -n "$job_id"
          curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" \
            --output /tmp/job.log
          {
            printf 'publication_run_id=%s\nfailed_job_id=%s\n\n' "$run_id" "$job_id"
            tail -n 140 /tmp/job.log
          } > /tmp/failure-tail.txt
          encoded="$(base64 -w 0 /tmp/failure-tail.txt)"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/failure-tail.txt" \
            --data "$(jq -cn --arg message 'Capture Phase 13 publication failure tail' --arg content "$encoded" --arg branch "$OPS_BRANCH" '{message:$message,content:$content,branch:$branch}')"
