name: Observe Phase 13 Publication

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-publication-observer.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record latest Phase 13 publication run
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
        shell: bash
        run: |
          set -euo pipefail
          echo "Refreshing Phase 13 publication status."
          response="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/phase13-publish.yml/runs?branch=main&event=workflow_dispatch&per_page=10")"
          run="$(printf '%s' "$response" | jq -c '.workflow_runs | sort_by(.created_at) | last')"
          test "$run" != "null"
          marker="$(printf '%s' "$run" | jq '{observedAt:(now|todateiso8601), id, run_number, run_attempt, status, conclusion, event, head_branch, head_sha, created_at, updated_at, html_url}')"
          encoded="$(printf '%s\n' "$marker" | base64 -w 0)"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/publication-run.json?ref=${OPS_BRANCH}" || true)"
          sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          body="$(jq -cn --arg message 'Record Phase 13 publication run' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/publication-run.json" \
            --data "$body"
