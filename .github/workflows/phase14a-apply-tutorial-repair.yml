name: Phase 14A Tutorial Repair

on:
  push:
    branches:
      - fix/v1.0.1-tutorial-repair
    paths:
      - .phase14a/tutorial-repair.part1.patch
      - .phase14a/tutorial-repair.part2.patch
      - .github/workflows/phase14a-apply-tutorial-repair.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase14a-tutorial-repair-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v1.0.1-tutorial-repair
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reviewable tutorial repair patch
        shell: bash
        run: |
          set -euo pipefail
          cat .phase14a/tutorial-repair.part1.patch .phase14a/tutorial-repair.part2.patch > /tmp/phase14a-tutorial-repair.patch
          git apply --check /tmp/phase14a-tutorial-repair.patch
          git apply /tmp/phase14a-tutorial-repair.patch
          node --check src/scenes/TutorialScene.js
          node --check src/tutorial/TutorialRecordingLock.js

      - name: Install exact dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Run Phase A targeted regression tests
        run: node --test tests/tutorialRecordingLock.test.js tests/phase10-release-candidate.test.js

      - name: Run complete validation
        run: |
          npm run lint
          npm run test
          npm run build

      - name: Commit validated tutorial repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/scenes/TutorialScene.js src/tutorial/TutorialRecordingLock.js tests/tutorialRecordingLock.test.js
          git diff --cached --check
          git commit -m "Fix tutorial Echo recording and explicit re-record flow"
          git push origin HEAD:fix/v1.0.1-tutorial-repair
