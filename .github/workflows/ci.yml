name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-and-domain:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npm run format:check
      - run: npm run lint
      - run: npm run test
      - run: npm run audit:security
      - run: npm run validate:save-compatibility
      - run: npm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: ci-static-evidence
          path: |
            docs/V1_0_1_WORKFLOW_SECURITY_AUDIT.json
            docs/V1_0_1_SAVE_COMPATIBILITY.json
            dist/
          if-no-files-found: warn
          retention-days: 14

  browser-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Browser smoke
        shell: bash
        run: |
          if [[ "${{ matrix.browser }}" == "chromium" ]]; then
            export CHROMIUM_EXECUTABLE="$(node -e "const {chromium}=require('playwright');process.stdout.write(chromium.executablePath())")"
            npm run validate:browser:chromium -- --smoke
            npm run validate:tutorial:trusted
          else
            export FIREFOX_EXECUTABLE="$(node -e "const {firefox}=require('playwright');process.stdout.write(firefox.executablePath())")"
            npm run validate:browser:firefox -- --smoke
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: ci-browser-${{ matrix.browser }}-evidence
          path: |
            docs/V1_0_1_TRUSTED_TUTORIAL_VALIDATION.json
            docs/evidence/v1.0.1/trusted-tutorial/
            docs/screenshots/
          if-no-files-found: warn
          retention-days: 14
