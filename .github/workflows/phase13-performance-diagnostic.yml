name: Phase 13 Hosted Performance Diagnostic

on:
  push:
    branches:
      - release/v1.0.0-certification
    paths:
      - scripts/phase13-xvfb-performance.mjs
      - scripts/phase10-performance-validation.mjs
      - scripts/phase10-browser-helpers.mjs
      - .github/workflows/phase13-performance-diagnostic.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase13-performance-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromium-performance:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx playwright install --with-deps chromium
      - name: Run unchanged Chromium performance gate across supported hosted modes
        shell: bash
        run: |
          export CHROMIUM_EXECUTABLE="$(node -e "const {chromium}=require('playwright');process.stdout.write(chromium.executablePath())")"
          npm run validate:performance:phase10
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase13-chromium-performance-diagnostic
          path: |
            docs/PHASE10_PERFORMANCE_VALIDATION.json
            docs/PHASE13_CHROMIUM_PERFORMANCE_ATTEMPT_*.json
            docs/PHASE13_CHROMIUM_PERFORMANCE_ATTEMPTS.json
          if-no-files-found: error
          retention-days: 30

  firefox-performance:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx playwright install --with-deps firefox
      - name: Run unchanged Firefox performance gate across supported hosted modes
        shell: bash
        run: |
          export FIREFOX_EXECUTABLE="$(node -e "const {firefox}=require('playwright');process.stdout.write(firefox.executablePath())")"
          npm run validate:performance:firefox:phase13
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase13-firefox-performance-diagnostic
          path: |
            docs/PHASE13_FIREFOX_PERFORMANCE_VALIDATION.json
            docs/PHASE13_FIREFOX_PERFORMANCE_ATTEMPT_*.json
            docs/PHASE13_FIREFOX_PERFORMANCE_ATTEMPTS.json
          if-no-files-found: error
          retention-days: 30
