name: Configure GitHub Pages Site

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-pages-status.yml
  workflow_dispatch:

permissions:
  pages: write
  contents: write

jobs:
  configure:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Switch Pages site to Actions workflow publishing
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
        shell: bash
        run: |
          set -euo pipefail
          before_code="$(curl --silent --show-error --location \
            --output /tmp/pages-before.json \
            --write-out '%{http_code}' \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" || true)"

          update_code="$(curl --silent --show-error --location \
            --request PUT \
            --output /tmp/pages-update.json \
            --write-out '%{http_code}' \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            --data '{"build_type":"workflow"}' || true)"

          after_code="$(curl --silent --show-error --location \
            --output /tmp/pages-after.json \
            --write-out '%{http_code}' \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" || true)"

          before="$(cat /tmp/pages-before.json 2>/dev/null || printf '{}')"
          update="$(cat /tmp/pages-update.json 2>/dev/null || printf '{}')"
          after="$(cat /tmp/pages-after.json 2>/dev/null || printf '{}')"
          marker="$(jq -cn \
            --arg observedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg beforeCode "$before_code" \
            --arg updateCode "$update_code" \
            --arg afterCode "$after_code" \
            --argjson before "$before" \
            --argjson update "$update" \
            --argjson after "$after" \
            '{observedAt:$observedAt,beforeHttpStatus:($beforeCode|tonumber),updateHttpStatus:($updateCode|tonumber),afterHttpStatus:($afterCode|tonumber),before:$before,updateResponse:$update,after:$after,passed:($after.build_type == "workflow")}')"
          encoded="$(printf '%s\n' "$marker" | base64 -w 0)"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/pages-site.json?ref=${OPS_BRANCH}" || true)"
          sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          payload="$(jq -cn --arg message 'Configure GitHub Pages for Actions publishing' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/pages-site.json" \
            --data "$payload"
          test "$(printf '%s' "$marker" | jq -r '.passed')" = "true"
