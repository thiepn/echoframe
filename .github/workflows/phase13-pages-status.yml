name: Observe GitHub Pages Site

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-pages-status.yml
  workflow_dispatch:

permissions:
  pages: write
  contents: write

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record Pages API status
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
        shell: bash
        run: |
          set -euo pipefail
          code="$(curl --silent --show-error --location \
            --output /tmp/pages.json \
            --write-out '%{http_code}' \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" || true)"
          body="$(cat /tmp/pages.json 2>/dev/null || printf '{}')"
          marker="$(printf '%s' "$body" | jq --arg observedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --arg httpStatus "$code" '. + {observedAt:$observedAt,httpStatus:($httpStatus|tonumber)}')"
          encoded="$(printf '%s\n' "$marker" | base64 -w 0)"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/pages-site.json?ref=${OPS_BRANCH}" || true)"
          sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          payload="$(jq -cn --arg message 'Record GitHub Pages site status' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/pages-site.json" \
            --data "$payload"
