name: Observe Final Version 1.0 Release

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-final-release-observer.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record latest final release run
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
        shell: bash
        run: |
          set -euo pipefail
          echo "Refreshing final Version 1.0 release attempt 2 status."
          response="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/phase13-finalize-live-release.yml/runs?branch=${OPS_BRANCH}&per_page=10")"
          run="$(printf '%s' "$response" | jq -c '.workflow_runs | sort_by(.created_at) | last')"
          test "$run" != "null"
          run_id="$(printf '%s' "$run" | jq -r '.id')"
          jobs="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?filter=latest&per_page=100")"
          marker="$(jq -cn --argjson run "$run" --argjson jobs "$jobs" '{observedAt:(now|todateiso8601),run:{id:$run.id,run_number:$run.run_number,run_attempt:$run.run_attempt,status:$run.status,conclusion:$run.conclusion,event:$run.event,head_branch:$run.head_branch,head_sha:$run.head_sha,created_at:$run.created_at,updated_at:$run.updated_at,html_url:$run.html_url},jobs:[$jobs.jobs[]|{id,name,status,conclusion,started_at,completed_at,steps:[.steps[]? | {name,status,conclusion,number}]}]}')"
          encoded="$(printf '%s\n' "$marker" | base64 -w 0)"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/final-release-run.json?ref=${OPS_BRANCH}" || true)"
          sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          payload="$(jq -cn --arg message 'Record final Version 1.0 release run' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/final-release-run.json" \
            --data "$payload"
