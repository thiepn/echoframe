name: Dispatch Phase 13 Publication

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-publication-dispatch.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch certified Version 1.0 publisher on main
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
        shell: bash
        run: |
          set -euo pipefail
          echo "Issuing isolated Phase 13 publication dispatch."
          curl --fail-with-body --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/phase13-publish.yml/dispatches" \
            --data '{"ref":"main"}'

          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          marker="$(printf '{\n  \"dispatchedAt\": \"%s\",\n  \"dispatcherRunId\": \"%s\",\n  \"targetWorkflow\": \"phase13-publish.yml\",\n  \"targetRef\": \"main\",\n  \"passed\": true\n}\n' "$dispatched_at" "$GITHUB_RUN_ID")"
          encoded="$(printf '%s' "$marker" | base64 -w 0)"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/success.json" \
            --data "{\"message\":\"Record successful Phase 13 publication dispatch\",\"content\":\"$encoded\",\"branch\":\"$OPS_BRANCH\"}"
          echo "Dispatched Phase 13 Publish Version 1.0 on main without a main-branch push."
