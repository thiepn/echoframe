name: Diagnose Phase 14A Aggregate Commit

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase14a-diagnose-aggregate.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Capture aggregate commit failure tail
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
          JOB_ID: '86202218638'
        shell: bash
        run: |
          set -euo pipefail
          echo "Capturing the Phase 14A aggregate commit failure tail."
          curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            --output /tmp/aggregate.log
          {
            grep -n -A120 -B20 'Commit non-public final evidence' /tmp/aggregate.log | tail -n 260 || true
            printf '\n--- FINAL LOG TAIL ---\n'
            tail -n 260 /tmp/aggregate.log
          } > /tmp/aggregate-failure.txt
          encoded="$(base64 -w 0 /tmp/aggregate-failure.txt)"
          path=".phase13-dispatch-status/phase14a-aggregate-failure.txt"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${OPS_BRANCH}" || true)"
          sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          payload="$(jq -cn --arg message 'Capture Phase 14A aggregate commit failure' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${path}" \
            --data "$payload"
