name: Publish Version 1.0.1

on:
  workflow_dispatch:
    inputs:
      certification_run_id:
        description: Successful trusted certification workflow run ID
        required: true
        type: string
      source_sha:
        description: Certified source commit SHA
        required: true
        type: string
      expected_bundle_digest:
        description: Certified production bundle SHA-256
        required: true
        type: string
      version:
        description: Release version
        required: true
        default: 1.0.1
        type: string

permissions:
  contents: read

concurrency:
  group: production-v1.0.1
  cancel-in-progress: false

jobs:
  verify-artifact:
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      source_sha: ${{ steps.identity.outputs.source_sha }}
      bundle_digest: ${{ steps.identity.outputs.bundle_digest }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: echoframe-v1.0.1-certification
          run-id: ${{ inputs.certification_run_id }}
          github-token: ${{ github.token }}
          path: certification
      - name: Verify immutable certification manifest
        id: identity
        shell: bash
        env:
          EXPECTED_SOURCE_SHA: ${{ inputs.source_sha }}
          EXPECTED_BUNDLE_DIGEST: ${{ inputs.expected_bundle_digest }}
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          test "$EXPECTED_VERSION" = "1.0.1"
          manifest="certification/release/ECHOFRAME_v1.0.1_RELEASE_MANIFEST.json"
          test -f "$manifest"
          test "$(jq -r .version "$manifest")" = "$EXPECTED_VERSION"
          test "$(jq -r .sourceSha "$manifest")" = "$EXPECTED_SOURCE_SHA"
          test "$(jq -r .productionBundleDigest "$manifest")" = "$EXPECTED_BUNDLE_DIGEST"
          (cd certification/release && sha256sum -c ECHOFRAME_v1.0.1_SHA256SUMS.txt)
          echo "source_sha=$EXPECTED_SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "bundle_digest=$EXPECTED_BUNDLE_DIGEST" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: certification/certified-web

  deploy-pages:
    needs: verify-artifact
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy certified artifact without checkout or build
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v4 (Node 24 release line)

  verify-public:
    needs: [verify-artifact, deploy-pages]
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx playwright install --with-deps chromium
      - name: Validate deployed certified source
        env:
          ECHOFRAME_PUBLIC_URL: ${{ needs.deploy-pages.outputs.page_url }}
          ECHOFRAME_EXPECTED_SOURCE_SHA: ${{ inputs.source_sha }}
          ECHOFRAME_EXPECTED_BUNDLE_DIGEST: ${{ inputs.expected_bundle_digest }}
        run: npm run validate:public
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: echoframe-v1.0.1-public-validation
          path: |
            docs/V1_0_1_PUBLIC_DEPLOYMENT_VALIDATION.json
            docs/screenshots/ECHOFRAME_v1.0.1_public_*.png
          if-no-files-found: error
          retention-days: 90

  tag-and-release:
    needs: [verify-artifact, verify-public]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ inputs.source_sha }}
      - name: Create guarded annotated tag
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          git fetch --no-tags origin main
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git merge-base --is-ancestor "$SOURCE_SHA" origin/main
          if git ls-remote --exit-code --tags origin refs/tags/v1.0.1 >/dev/null 2>&1; then
            echo "v1.0.1 already exists; refusing to move or replace it." >&2
            exit 1
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a v1.0.1 "$SOURCE_SHA" -m "ECHOFRAME: LAST SIGNAL Version 1.0.1"
          git push origin refs/tags/v1.0.1
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: echoframe-v1.0.1-certification
          run-id: ${{ inputs.certification_run_id }}
          github-token: ${{ github.token }}
          path: certification
      - name: Publish GitHub release from certified files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v1.0.1 \
            certification/release/ECHOFRAME_v1.0.1_* \
            --verify-tag \
            --title "ECHOFRAME: LAST SIGNAL Version 1.0.1" \
            --notes-file certification/docs/RELEASE_NOTES_v1.0.1.md
