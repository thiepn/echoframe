name: Phase 13 PR Certification

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase13-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  certify:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Detect materialized repository source
        id: repo-state
        shell: bash
        run: |
          if test -f package.json; then
            echo "materialized=true" >> "$GITHUB_OUTPUT"
          else
            echo "materialized=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify source archive
        shell: bash
        run: |
          test -f ECHOFRAME_phase12_certification_candidate.zip
          echo "8cbc7d526c80ae0ea1c506cf580518cc5abed93b7f653eeb2ca43b659db122ca  ECHOFRAME_phase12_certification_candidate.zip" | sha256sum -c -

      - name: Extract verified candidate
        shell: bash
        run: |
          rm -rf candidate
          mkdir candidate
          unzip -q ECHOFRAME_phase12_certification_candidate.zip -d candidate
          test -f candidate/package.json
          test -f candidate/package-lock.json

      - name: Normalize lockfile registry for hosted runners
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          lock = Path('candidate/package-lock.json')
          text = lock.read_text(encoding='utf-8')
          internal = 'https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/'
          public = 'https://registry.npmjs.org/'
          replacements = text.count(internal)
          if replacements == 0:
              raise SystemExit('Expected internal registry URLs were not found; refusing an untracked lockfile transformation.')
          text = text.replace(internal, public)
          if 'packages.applied-caas-gateway1.internal.api.openai.org' in text:
              raise SystemExit('Internal registry URL remains after normalization.')
          lock.write_text(text, encoding='utf-8')
          print(f'Normalized {replacements} lockfile tarball URLs to registry.npmjs.org')
          PY

      - name: Apply deterministic Chromium input harness patch
        working-directory: candidate
        shell: bash
        run: |
          patch --forward -p1 < ../phase13/patches/chromium-input-harness.patch
          node --check scripts/phase10-browser-validation.mjs

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: candidate/package-lock.json

      - name: Record environment
        working-directory: candidate
        shell: bash
        run: |
          uname -a
          node --version
          npm --version
          npx playwright --version

      - name: Install dependencies
        timeout-minutes: 10
        working-directory: candidate
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Install real browsers
        timeout-minutes: 15
        working-directory: candidate
        run: npx playwright install --with-deps chromium firefox

      - name: Resolve Playwright browser paths
        id: browser-paths
        working-directory: candidate
        shell: bash
        run: |
          chromium_path="$(node -e "const { chromium } = require('playwright'); process.stdout.write(chromium.executablePath())")"
          firefox_path="$(node -e "const { firefox } = require('playwright'); process.stdout.write(firefox.executablePath())")"
          test -x "$chromium_path"
          test -x "$firefox_path"
          echo "chromium=$chromium_path" >> "$GITHUB_OUTPUT"
          echo "firefox=$firefox_path" >> "$GITHUB_OUTPUT"
          "$chromium_path" --version
          MOZ_HEADLESS=1 "$firefox_path" --version

      - name: Core validation
        working-directory: candidate
        run: npm run validate:core:phase10

      - name: Chromium production validation
        working-directory: candidate
        env:
          CHROMIUM_EXECUTABLE: ${{ steps.browser-paths.outputs.chromium }}
        run: npm run validate:browser:phase12

      - name: Firefox production validation
        working-directory: candidate
        env:
          FIREFOX_EXECUTABLE: ${{ steps.browser-paths.outputs.firefox }}
        run: npm run validate:browser:firefox:phase12

      - name: Root and subpath validation
        working-directory: candidate
        env:
          CHROMIUM_EXECUTABLE: ${{ steps.browser-paths.outputs.chromium }}
          FIREFOX_EXECUTABLE: ${{ steps.browser-paths.outputs.firefox }}
        run: npm run validate:deployment:phase12

      - name: Cross-browser determinism
        working-directory: candidate
        env:
          CHROMIUM_EXECUTABLE: ${{ steps.browser-paths.outputs.chromium }}
          FIREFOX_EXECUTABLE: ${{ steps.browser-paths.outputs.firefox }}
        run: npm run audit:determinism:phase12

      - name: Confirm expected release-candidate audit state
        working-directory: candidate
        shell: bash
        run: |
          npm run audit:release:phase12 || true
          node - <<'NODE'
          const fs = require('node:fs');
          const report = JSON.parse(fs.readFileSync('docs/PHASE12_FINAL_RELEASE_AUDIT.json', 'utf8'));
          const allowedOpen = new Set([
            'packageVersionFinal', 'runtimeVersionFinal', 'deploymentFirefoxPassed',
            'accessibilityPassed', 'audioPassed', 'ciPassed', 'publicDeploymentPassed',
            'lifecyclePassed', 'idlePassed', 'soakPassed', 'performancePassed',
          ]);
          const unexpected = (report.openGates || []).filter((gate) => !allowedOpen.has(gate));
          if (unexpected.length) throw new Error(`Unexpected pre-promotion gates: ${unexpected.join(', ')}`);
          for (const gate of ['corePassed', 'chromiumPassed', 'firefoxPassed', 'deploymentPassed', 'determinismPassed', 'sourceSecurityPassed']) {
            if (report.checks?.[gate] !== true) throw new Error(`Required candidate gate is not green: ${gate}`);
          }
          console.log(JSON.stringify({ expectedCandidateState: true, openGates: report.openGates }, null, 2));
          NODE

      - name: Materialize certified candidate source
        if: steps.repo-state.outputs.materialized == 'false'
        shell: bash
        run: |
          rm -rf candidate/node_modules candidate/dist candidate/dist-* candidate/.phase* candidate/playwright-report candidate/test-results
          rm -rf /tmp/phase13-materialized
          mkdir -p /tmp/phase13-materialized
          rsync -a candidate/ /tmp/phase13-materialized/
          git fetch origin release/v1.0.0-certification
          git checkout -B release/v1.0.0-certification origin/release/v1.0.0-certification
          rsync -a /tmp/phase13-materialized/ ./
          test -f package.json
          test -f package-lock.json
          test -f scripts/phase10-browser-validation.mjs
          ! grep -R "packages.applied-caas-gateway1.internal.api.openai.org" package-lock.json
          node --check scripts/phase10-browser-validation.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Materialize certified Phase 12 source"
          git push origin HEAD:release/v1.0.0-certification

      - name: Upload certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase13-pr-certification-evidence
          path: |
            candidate/package-lock.json
            candidate/scripts/phase10-browser-validation.mjs
            candidate/docs/PHASE11_*.json
            candidate/docs/PHASE12_*.json
            candidate/docs/screenshots/*.png
          if-no-files-found: warn
          retention-days: 30
