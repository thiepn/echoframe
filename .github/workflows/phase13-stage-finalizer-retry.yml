name: Stage Final Release Retry

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-stage-finalizer-retry.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Stage finalizer with certified-evidence retry marker
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
          TARGET_PATH: .github/workflows/phase13-finalize-live-release.yml
          STAGED_PATH: .phase13-dispatch-status/finalizer-retry3.yml
          METADATA_PATH: .phase13-dispatch-status/finalizer-retry3-metadata.json
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}?ref=${OPS_BRANCH}")"
          printf '%s' "$response" | jq -r '.content' | tr -d '\n' | base64 -d > /tmp/finalizer-retry.yml
          grep -q 'restore_validator()' /tmp/finalizer-retry.yml
          printf '\n# Release retry 3: certified 1,329-test core evidence synchronized to main.\n' >> /tmp/finalizer-retry.yml
          encoded="$(base64 -w 0 /tmp/finalizer-retry.yml)"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${STAGED_PATH}?ref=${OPS_BRANCH}" || true)"
          existing_sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          stage_payload="$(jq -cn --arg message 'Stage final Version 1.0 retry 3 workflow' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$existing_sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          stage_response="$(curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${STAGED_PATH}" \
            --data "$stage_payload")"
          stage_commit="$(printf '%s' "$stage_response" | jq -r '.commit.sha')"
          staged_blob="$(printf '%s' "$stage_response" | jq -r '.content.sha')"
          commit_response="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/commits/${stage_commit}")"
          base_tree="$(printf '%s' "$commit_response" | jq -r '.tree.sha')"
          metadata="$(jq -cn --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --arg stageCommit "$stage_commit" --arg baseTreeSha "$base_tree" --arg stagedBlobSha "$staged_blob" '{generatedAt:$generatedAt,stageCommit:$stageCommit,baseTreeSha:$baseTreeSha,stagedBlobSha:$stagedBlobSha,passed:true}')"
          metadata_encoded="$(printf '%s\n' "$metadata" | base64 -w 0)"
          metadata_existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${METADATA_PATH}?ref=${OPS_BRANCH}" || true)"
          metadata_sha="$(printf '%s' "$metadata_existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          metadata_payload="$(jq -cn --arg message 'Record finalizer retry 3 metadata' --arg content "$metadata_encoded" --arg branch "$OPS_BRANCH" --arg sha "$metadata_sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${METADATA_PATH}" \
            --data "$metadata_payload"
