name: Diagnose Phase 14A Browser Regression

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase14a-diagnostics.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Capture focused browser failure
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
          JOB_ID: '86147377368'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            --output /tmp/phase14a.log
          {
            printf 'job_id=%s\n\n' "$JOB_ID"
            sed -n '/Run real Chromium tutorial regression/,$p' /tmp/phase14a.log | tail -n 360
            printf '\n--- ERROR SUMMARY ---\n'
            grep -E -i -C 14 'error|exception|timeout|failed|expected|actual|assert|process completed' /tmp/phase14a.log | tail -n 280 || true
          } > /tmp/phase14a-failure.txt
          encoded="$(base64 -w 0 /tmp/phase14a-failure.txt)"
          path=".phase13-dispatch-status/phase14a-browser-failure.txt"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${OPS_BRANCH}" || true)"
          sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          payload="$(jq -cn --arg message 'Capture Phase 14A browser failure' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${path}" \
            --data "$payload"
