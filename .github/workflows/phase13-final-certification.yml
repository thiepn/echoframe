name: Phase 13 Final Version 1.0 Certification

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/PHASE13_*.json'
      - 'docs/PHASE13_*.md'
      - 'docs/screenshots/ECHOFRAME_v1_*.png'
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase13-final-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PHASE13_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  core-browsers:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PHASE13_SOURCE_COMMIT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx playwright install --with-deps chromium firefox
      - id: browsers
        shell: bash
        run: |
          chromium="$(node -e "const { chromium }=require('playwright');process.stdout.write(chromium.executablePath())")"
          firefox="$(node -e "const { firefox }=require('playwright');process.stdout.write(firefox.executablePath())")"
          echo "chromium=$chromium" >> "$GITHUB_OUTPUT"
          echo "firefox=$firefox" >> "$GITHUB_OUTPUT"
          uname -a
          "$chromium" --version
          MOZ_HEADLESS=1 "$firefox" --version
      - name: Require final identity
        run: |
          test "$(node -p "require('./package.json').version")" = "1.0.0"
          test "$(node -e "import('./src/utils/version.js').then(m=>process.stdout.write(m.BUILD_VERSION))")" = "1.0.0"
      - name: Core validation
        run: npm run validate:core:phase10
      - name: Chromium production matrix
        env:
          CHROMIUM_EXECUTABLE: ${{ steps.browsers.outputs.chromium }}
        run: npm run validate:browser:phase12
      - name: Preserve final Chromium screenshots
        run: |
          cp docs/screenshots/ECHOFRAME_phase10_main_menu.png docs/screenshots/ECHOFRAME_v1_main_menu_chromium.png
          cp docs/screenshots/ECHOFRAME_phase10_results.png docs/screenshots/ECHOFRAME_v1_results_chromium.png
          cp docs/screenshots/ECHOFRAME_phase10_accessibility.png docs/screenshots/ECHOFRAME_v1_accessibility_chromium.png
          cp docs/screenshots/ECHOFRAME_phase10_credits.png docs/screenshots/ECHOFRAME_v1_credits.png
      - name: Firefox production matrix
        env:
          FIREFOX_EXECUTABLE: ${{ steps.browsers.outputs.firefox }}
        run: npm run validate:browser:firefox:phase12
      - name: Firefox final screenshots
        env:
          FIREFOX_EXECUTABLE: ${{ steps.browsers.outputs.firefox }}
        run: node scripts/phase13-firefox-screenshots.mjs
      - name: Chromium static bases
        env:
          CHROMIUM_EXECUTABLE: ${{ steps.browsers.outputs.chromium }}
        run: npm run validate:deployment:phase12
      - name: Firefox static bases
        env:
          FIREFOX_EXECUTABLE: ${{ steps.browsers.outputs.firefox }}
        run: npm run validate:firefox-static:phase13
      - name: Cross-browser determinism
        env:
          CHROMIUM_EXECUTABLE: ${{ steps.browsers.outputs.chromium }}
          FIREFOX_EXECUTABLE: ${{ steps.browsers.outputs.firefox }}
        run: npm run audit:determinism:phase12
      - name: Chromium accessibility
        env:
          CHROMIUM_EXECUTABLE: ${{ steps.browsers.outputs.chromium }}
        run: npm run validate:accessibility:phase10
      - name: Firefox accessibility
        env:
          FIREFOX_EXECUTABLE: ${{ steps.browsers.outputs.firefox }}
        run: npm run validate:accessibility:firefox:phase13
      - name: Source, security, and npm audit
        run: npm run audit:source-security:phase12
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase13-final-core-browsers
          path: |
            docs/PHASE10_CORE_VALIDATION.json
            docs/PHASE10_ACCESSIBILITY_BROWSER_VALIDATION.json
            docs/PHASE12_*.json
            docs/PHASE13_FIREFOX_STATIC_BASES.json
            docs/PHASE13_FIREFOX_ACCESSIBILITY_VALIDATION.json
            docs/PHASE13_FIREFOX_SCREENSHOT_VALIDATION.json
            docs/screenshots/ECHOFRAME_v1_*.png
          if-no-files-found: warn
          retention-days: 30

  lifecycle-performance:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PHASE13_SOURCE_COMMIT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx playwright install --with-deps chromium firefox
      - id: browsers
        shell: bash
        run: |
          echo "chromium=$(node -e "const {chromium}=require('playwright');process.stdout.write(chromium.executablePath())")" >> "$GITHUB_OUTPUT"
          echo "firefox=$(node -e "const {firefox}=require('playwright');process.stdout.write(firefox.executablePath())")" >> "$GITHUB_OUTPUT"
      - name: Chromium 60-cycle lifecycle
        env:
          CHROMIUM_EXECUTABLE: ${{ steps.browsers.outputs.chromium }}
        run: npm run validate:lifecycle:phase10
      - name: Firefox lifecycle subset
        env:
          FIREFOX_EXECUTABLE: ${{ steps.browsers.outputs.firefox }}
        run: npm run validate:lifecycle:firefox:phase13
      - name: Chromium performance
        env:
          CHROMIUM_EXECUTABLE: ${{ steps.browsers.outputs.chromium }}
        run: npm run validate:performance:phase10
      - name: Firefox performance
        env:
          FIREFOX_EXECUTABLE: ${{ steps.browsers.outputs.firefox }}
        run: npm run validate:performance:firefox:phase13
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase13-final-lifecycle-performance
          path: |
            docs/PHASE10_LIFECYCLE_VALIDATION.json
            docs/PHASE10_PERFORMANCE_VALIDATION.json
            docs/PHASE13_FIREFOX_LIFECYCLE_VALIDATION.json
            docs/PHASE13_FIREFOX_PERFORMANCE_VALIDATION.json
          if-no-files-found: error
          retention-days: 30

  menu-idle:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PHASE13_SOURCE_COMMIT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx playwright install --with-deps chromium
      - name: 30-minute menu idle
        env:
          PHASE10_IDLE_DURATION_MS: '1800000'
        shell: bash
        run: |
          export CHROMIUM_EXECUTABLE="$(node -e "const {chromium}=require('playwright');process.stdout.write(chromium.executablePath())")"
          npm run validate:idle:phase10
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase13-final-menu-idle
          path: docs/PHASE10_MENU_IDLE_VALIDATION.json
          if-no-files-found: error
          retention-days: 30

  active-soak:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PHASE13_SOURCE_COMMIT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx playwright install --with-deps chromium
      - name: 30-minute active soak
        env:
          PHASE10_SOAK_DURATION_MS: '1800000'
        shell: bash
        run: |
          export CHROMIUM_EXECUTABLE="$(node -e "const {chromium}=require('playwright');process.stdout.write(chromium.executablePath())")"
          npm run validate:soak:phase10
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase13-final-active-soak
          path: docs/PHASE10_ACTIVE_SOAK_VALIDATION.json
          if-no-files-found: error
          retention-days: 30

  firefox-soak:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PHASE13_SOURCE_COMMIT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx playwright install --with-deps firefox
      - name: 10-minute Firefox soak
        env:
          PHASE10_SOAK_DURATION_MS: '600000'
        shell: bash
        run: |
          export FIREFOX_EXECUTABLE="$(node -e "const {firefox}=require('playwright');process.stdout.write(firefox.executablePath())")"
          npm run validate:soak:firefox:phase13
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase13-final-firefox-soak
          path: docs/PHASE13_FIREFOX_SOAK_VALIDATION.json
          if-no-files-found: error
          retention-days: 30

  aggregate-package:
    needs: [core-browsers, lifecycle-performance, menu-idle, active-soak, firefox-soak]
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PHASE13_SOURCE_COMMIT }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx playwright install --with-deps chromium firefox
      - uses: actions/download-artifact@v4
        with:
          pattern: phase13-final-*
          path: .phase13-final-artifacts
          merge-multiple: true
      - name: Merge final evidence
        shell: bash
        run: |
          mkdir -p docs/screenshots
          find .phase13-final-artifacts -type f -name '*.json' -maxdepth 3 -exec cp -f {} docs/ \;
          find .phase13-final-artifacts -type f -name '*.png' -maxdepth 4 -exec cp -f {} docs/screenshots/ \;
          ls -la docs/PHASE*.json | tail
      - name: Resolve browser paths
        shell: bash
        run: |
          echo "CHROMIUM_EXECUTABLE=$(node -e "const {chromium}=require('playwright');process.stdout.write(chromium.executablePath())")" >> "$GITHUB_ENV"
          echo "FIREFOX_EXECUTABLE=$(node -e "const {firefox}=require('playwright');process.stdout.write(firefox.executablePath())")" >> "$GITHUB_ENV"
      - name: Aggregate non-public release evidence
        run: node scripts/phase13-nonpublic-audit.mjs
      - name: Build and validate release archives
        shell: bash
        run: |
          node scripts/phase13-package-final.mjs
          node scripts/phase13-validate-archives.mjs
          node scripts/phase13-package-final.mjs
          node scripts/phase13-validate-archives.mjs
      - name: Preserve generated evidence and release files
        shell: bash
        run: |
          rm -rf /tmp/phase13-final-output
          mkdir -p /tmp/phase13-final-output/docs/screenshots /tmp/phase13-final-output/release
          cp -f docs/PHASE13_* /tmp/phase13-final-output/docs/ 2>/dev/null || true
          cp -f docs/screenshots/ECHOFRAME_v1_*.png /tmp/phase13-final-output/docs/screenshots/ 2>/dev/null || true
          cp -f release/* /tmp/phase13-final-output/release/
      - name: Commit non-public final evidence
        shell: bash
        run: |
          git reset --hard "$PHASE13_SOURCE_COMMIT"
          git clean -fd
          git fetch origin release/v1.0.0-certification
          git checkout -B release/v1.0.0-certification origin/release/v1.0.0-certification
          mkdir -p docs/screenshots release
          cp -f /tmp/phase13-final-output/docs/PHASE13_* docs/ 2>/dev/null || true
          cp -f /tmp/phase13-final-output/docs/screenshots/* docs/screenshots/ 2>/dev/null || true
          cp -f /tmp/phase13-final-output/release/* release/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PHASE13_* docs/screenshots/ECHOFRAME_v1_* release/
          if git diff --cached --quiet; then
            echo "Certification evidence is unchanged; nothing to commit."
          else
            git commit -m "Record final Version 1.0 certification evidence"
            git push origin HEAD:release/v1.0.0-certification
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: phase13-final-release-artifacts
          path: |
            release/*
            docs/PHASE13_*
            docs/screenshots/ECHOFRAME_v1_*.png
          if-no-files-found: error
          retention-days: 90
