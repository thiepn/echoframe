name: Observe Phase 14A Browser Regression

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase14a-observer.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record latest Phase 14A browser workflow
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
          TARGET_BRANCH: fix/v1.0.1-tutorial-repair
        shell: bash
        run: |
          set -euo pipefail
          echo "Refreshing final Phase 14A browser regression status."
          runs="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/phase14a-browser-regression.yml/runs?branch=${TARGET_BRANCH}&per_page=10")"
          run="$(printf '%s' "$runs" | jq -c '.workflow_runs | sort_by(.created_at) | last')"
          test "$run" != "null"
          run_id="$(printf '%s' "$run" | jq -r '.id')"
          jobs="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?filter=latest&per_page=100")"
          marker="$(jq -cn --argjson run "$run" --argjson jobs "$jobs" '{observedAt:(now|todateiso8601),run:{id:$run.id,status:$run.status,conclusion:$run.conclusion,head_sha:$run.head_sha,created_at:$run.created_at,updated_at:$run.updated_at,html_url:$run.html_url},jobs:[$jobs.jobs[]|{id,name,status,conclusion,steps:[.steps[]? | {name,status,conclusion,number}]}]}')"
          encoded="$(printf '%s\n' "$marker" | base64 -w 0)"
          path=".phase13-dispatch-status/phase14a-browser-run.json"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${OPS_BRANCH}" || true)"
          sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          payload="$(jq -cn --arg message 'Record Phase 14A browser workflow status' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${path}" \
            --data "$payload"
