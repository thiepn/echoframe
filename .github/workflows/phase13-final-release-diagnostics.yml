name: Diagnose Final Version 1.0 Release

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase13-final-release-diagnostics.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Capture final release failure details
        env:
          GH_TOKEN: ${{ github.token }}
          OPS_BRANCH: ops/phase13-publication-dispatch
          RUN_ID: '28970552734'
          JOB_ID: '85964869559'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            --output /tmp/final-release.log
          {
            printf 'run_id=%s\njob_id=%s\n\n' "$RUN_ID" "$JOB_ID"
            sed -n '/Validate live site in real Chromium and Firefox/,$p' /tmp/final-release.log | head -n 260
            printf '\n--- ERROR SUMMARY ---\n'
            grep -E -i -C 8 'error|exception|timeout|failed|expected|actual|browser has been closed|target closed' /tmp/final-release.log | tail -n 220 || true
          } > /tmp/final-release-failure.txt
          encoded="$(base64 -w 0 /tmp/final-release-failure.txt)"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/final-release-failure.txt?ref=${OPS_BRANCH}" || true)"
          sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          payload="$(jq -cn --arg message 'Capture final Version 1.0 release failure' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.phase13-dispatch-status/final-release-failure.txt" \
            --data "$payload"
