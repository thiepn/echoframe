name: Stage Archived Version 1.0 Publisher

on:
  push:
    branches:
      - ops/phase13-publication-dispatch
    paths:
      - .github/workflows/phase14a-stage-archive-publisher.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OPS_BRANCH: ops/phase13-publication-dispatch
      TARGET_PATH: .github/workflows/phase13-publish.yml
      STAGED_PATH: .phase13-dispatch-status/phase13-publish-archived.yml
      METADATA_PATH: .phase13-dispatch-status/phase13-publish-archived-metadata.json
    steps:
      - name: Stage manual-only Version 1.0 publisher
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}?ref=main")"
          printf '%s' "$response" | jq -r '.content' | tr -d '\n' | base64 -d > /tmp/phase13-publish.yml
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/phase13-publish.yml')
          source = path.read_text()
          old = """on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/PHASE13_*.json'
      - 'docs/PHASE13_*.md'
      - 'docs/screenshots/ECHOFRAME_v1_*.png'
      - 'release/**'
  workflow_dispatch:
"""
          new = """# Version 1.0 is already published and verified. Keep this historical publisher manual-only.
on:
  workflow_dispatch:
"""
          assert source.count(old) == 1, source.count(old)
          path.write_text(source.replace(old, new, 1))
          PY
          encoded="$(base64 -w 0 /tmp/phase13-publish.yml)"
          existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${STAGED_PATH}?ref=${OPS_BRANCH}" || true)"
          existing_sha="$(printf '%s' "$existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          stage_payload="$(jq -cn --arg message 'Stage archived Version 1.0 publisher' --arg content "$encoded" --arg branch "$OPS_BRANCH" --arg sha "$existing_sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          stage_response="$(curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${STAGED_PATH}" \
            --data "$stage_payload")"
          stage_commit="$(printf '%s' "$stage_response" | jq -r '.commit.sha')"
          staged_blob="$(printf '%s' "$stage_response" | jq -r '.content.sha')"
          main_commit="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" | jq -r '.object.sha')"
          main_tree="$(curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/commits/${main_commit}" | jq -r '.tree.sha')"
          metadata="$(jq -cn --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --arg mainCommit "$main_commit" --arg mainTreeSha "$main_tree" --arg stagedBlobSha "$staged_blob" '{generatedAt:$generatedAt,mainCommit:$mainCommit,mainTreeSha:$mainTreeSha,stagedBlobSha:$stagedBlobSha,passed:true}')"
          metadata_encoded="$(printf '%s\n' "$metadata" | base64 -w 0)"
          metadata_existing="$(curl --silent --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${METADATA_PATH}?ref=${OPS_BRANCH}" || true)"
          metadata_sha="$(printf '%s' "$metadata_existing" | jq -r '.sha // empty' 2>/dev/null || true)"
          metadata_payload="$(jq -cn --arg message 'Record archived publisher metadata' --arg content "$metadata_encoded" --arg branch "$OPS_BRANCH" --arg sha "$metadata_sha" '{message:$message,content:$content,branch:$branch} + (if $sha == "" then {} else {sha:$sha} end)')"
          curl --fail-with-body --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${METADATA_PATH}" \
            --data "$metadata_payload"
