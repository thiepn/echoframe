name: Deploy ECHOFRAME to GitHub Pages

on:
  workflow_run:
    workflows: ["ECHOFRAME CI"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

environment:
  name: github-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout certified source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@v5
      - name: Determine Vite base path
        shell: bash
        run: |
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY%/*}"
          if [[ "$REPOSITORY_NAME" == "${OWNER_NAME}.github.io" ]]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${REPOSITORY_NAME}/" >> "$GITHUB_ENV"
          fi
      - run: npm ci
      - name: Recheck mandatory core gates
        run: npm run validate:core:phase10
      - name: Build deployment artifact once
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy certified Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
