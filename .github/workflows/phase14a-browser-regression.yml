name: Phase 14A Real Browser Tutorial Regression

on:
  push:
    branches:
      - fix/v1.0.1-tutorial-repair
    paths:
      - .phase14a/tutorial-browser-regression.patch
      - .github/workflows/phase14a-browser-regression.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase14a-browser-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v1.0.1-tutorial-repair
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reviewable browser regression patch
        shell: bash
        run: |
          set -euo pipefail
          echo "Applying trusted Space-input tutorial regression coverage."
          git apply --check .phase14a/tutorial-browser-regression.patch
          git apply .phase14a/tutorial-browser-regression.patch
          node --check src/scenes/TutorialScene.js
          node --check scripts/phase10-browser-validation.mjs

      - name: Install exact dependencies and Chromium
        run: |
          npm ci --no-audit --no-fund --prefer-offline
          npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Run static and unit validation
        run: |
          npm run lint
          npm run test
          npm run build

      - name: Run real Chromium tutorial regression
        shell: bash
        run: |
          set -euo pipefail
          export CHROMIUM_EXECUTABLE="$(node -e "const {chromium}=require('playwright');process.stdout.write(chromium.executablePath())")"
          npm run validate:browser:phase10

      - name: Commit validated browser regression coverage
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/scenes/TutorialScene.js scripts/phase10-browser-validation.mjs
          git diff --cached --check
          git commit -m "Cover delayed Echo deployment in real browser validation"
          git push origin HEAD:fix/v1.0.1-tutorial-repair

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase14a-tutorial-browser-regression
          path: |
            docs/PHASE10_BROWSER_VALIDATION.json
            docs/screenshots/ECHOFRAME_phase10_tutorial_echo.png
          if-no-files-found: warn
          retention-days: 30
